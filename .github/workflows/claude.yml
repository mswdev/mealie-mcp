name: Claude Assistant

# Responds to @claude mentions on issues, PR comments, and PR reviews.
# Uses anthropics/claude-code-action@v1 which natively reads .claude/CLAUDE.md.
#
# Triggers:
# 1. @claude mention in issue/PR comments or PR reviews
# 2. Issue assigned to claude[bot]
# 3. 'claude' label added to an issue

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    # Only repo owners/members/collaborators can trigger via @claude mentions — prevents
    # arbitrary public commenters from spending the API key on this write-scoped job.
    if: >
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (
        (github.event.action == 'assigned' && github.event.assignee.login == 'claude[bot]') ||
        (github.event.action == 'labeled' && github.event.label.name == 'claude')
      ))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1
        id: claude-assistant
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          assignee_trigger: "claude"
          label_trigger: "claude"
          # Customize model and max turns as needed
          claude_args: |
            --model claude-sonnet-4-5-20250929
            --max-turns 15

      - name: Post assistant stats
        if: always() && steps.claude-assistant.outputs.execution_file != ''
        uses: ./.github/actions/claude-stats
        with:
          execution-file: ${{ steps.claude-assistant.outputs.execution_file }}
          entity-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          max-turns: "15"
          model-name: "claude-sonnet-4-5"
          label: "Claude Stats"
          fallback-to-issue: "true"
